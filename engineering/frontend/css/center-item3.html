<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>居中元素3(定位+负外边距已知子元素宽高)</title>
</head>
<body>
  <div class="container absolute-center-margin">
    <div class="item">居中元素</div>
  </div>
</body>

  <style>
    .absolute-center-margin {
      position: relative;
      height: 300px;
      border: 1px solid #555555;
    }

    .item {
      position: absolute;
      top: 50%;
      height: 50%;
      margin-left: -50px;
      margin-top: -50px;

      width: 100px;
      height: 100px;
      background-color: lightcoral;
      text-align: center;
      line-height: 100px;
    }
  </style>
</html>
