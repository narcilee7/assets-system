<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>居中元素2</title>
    </head>
    <body>
        <div class="container absolute-center-transform">
            <div class="item">居中元素</div>
        </div>
    </body>
    <style>
        .absolute-center-transform {
            position: relative;
            height: 300px;
            border: 1px solid #555555;
        }

        .item {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 100px;
            height: 100px;
            background-color: lightcoral;
            text-align: center;
            line-height: 100px;
        }
    </style>
</html>
